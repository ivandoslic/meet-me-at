name: meet-me-at

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?Set POSTGRES_ADMIN_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}

      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?Set KEYCLOAK_DB_PASSWORD in .env}
    
    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro

    shm_size: 128mb
    stop_grace_period: 30s

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command: start-dev

    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?Set KEYCLOAK_DB_PASSWORD in .env}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:?Set KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME in .env}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?Set KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD in .env}

      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8081}
      KC_HEALTH_ENABLED: "true"

    ports:
      - "127.0.0.1:8081:8080"

    depends_on:
      postgres:
        condition: service_healthy

    mem_limit: 1g
    stop_grace_period: 30s

    healthcheck:
      test:
        - CMD-SHELL
        - |
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 &&
          printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres-data:

