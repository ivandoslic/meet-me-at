spring.application.name=profile-service

server.port=${PROFILE_SERVICE_PORT:8082}

spring.datasource.url=${PROFILE_DB_URL:jdbc:postgresql://localhost:5432/profile_service}
spring.datasource.username=${PROFILE_DB_USER:profile_service}
spring.datasource.password=${PROFILE_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.clean-disabled=true
spring.flyway.validate-migration-naming=true